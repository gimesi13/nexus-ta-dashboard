  <main class="gh-container gh-container-wide">
    <h1 style="font-size:20px;margin:0 0 16px;">Test-Case Inventory</h1>

    <div class="kpi-strip" id="kpis"></div>

    <div class="controls">
      <input type="search" id="search" placeholder="Search test case or spec..." autocomplete="off" />
      <select id="filter-area"><option value="">All areas</option></select>
      <select id="filter-type"><option value="">All types</option></select>
      <select id="filter-tag"><option value="">All tags</option></select>
      <span class="result-count" id="result-count"></span>
    </div>

    <div class="table-wrap">
      <table class="gh-table">
        <thead>
          <tr>
            <th data-sort="area">Area <span class="arrow"></span></th>
            <th data-sort="spec">Spec <span class="arrow"></span></th>
            <th data-sort="name">Test case <span class="arrow"></span></th>
            <th data-sort="type">Type <span class="arrow"></span></th>
            <th>Tags</th>
            <th data-sort="cases" class="cell-num">Cases <span class="arrow"></span></th>
            <th data-sort="owner">Owner <span class="arrow"></span></th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="7" class="state-msg">Loading inventory...</td></tr>
        </tbody>
      </table>
    </div>

    <p class="provenance" id="provenance"></p>
  </main>

  <footer class="gh-footer">
    <span>Nexus TA Dashboard &middot; hosted on GitHub Pages</span>
  </footer>

  <script src="inventory.js"></script>
