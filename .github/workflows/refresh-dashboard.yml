name: Refresh dashboard

# Manual fallback only. GitHub-hosted runners cannot reach private TeamCity
# (teamcity.dynata.com). Nightly refresh runs on TeamCity build
# "TA Dashboard Publish" after Regression Tests finishes — no Mac needed.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pages site
        uses: actions/checkout@v4

      - name: Checkout dk-microservices (module sources)
        uses: actions/checkout@v4
        with:
          repository: dynata/dk-microservices
          token: ${{ secrets.DK_MICROSERVICES_TOKEN }}
          path: _monorepo
          # Full history required for Progress (first-seen Spock features via git log).
          fetch-depth: 0
          # Module + paths needed to refresh AI Platform headline stats.
          # (Service README recount may be incomplete in sparse checkout — generator keeps prior.)
          sparse-checkout: |
            gateway/unifiedApi/NexusApiRegressionTests
            .cursor
            docs/backend
            .github/workflows
          sparse-checkout-cone-mode: true

      - name: Overlay latest generators + fetch TC helpers
        run: |
          MODULE="_monorepo/gateway/unifiedApi/NexusApiRegressionTests"
          test -d "$MODULE"
          cp -R .github/module-overlay/. "$MODULE/"
          mkdir -p "$MODULE/ta-runtime" "$MODULE/dashboard/data"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch TeamCity nightly + regenerate JSON
        env:
          TEAMCITY_URL: ${{ secrets.TEAMCITY_URL }}
          TEAMCITY_TOKEN: ${{ secrets.TEAMCITY_TOKEN }}
          TEAMCITY_NIGHTLY_BUILD_TYPE_ID: ${{ secrets.TEAMCITY_NIGHTLY_BUILD_TYPE_ID }}
        run: |
          set -euo pipefail
          MODULE="_monorepo/gateway/unifiedApi/NexusApiRegressionTests"
          cd "$MODULE"
          python3 automation/tc_fetch_nightly.py
          python3 dashboard/tools/generate_inventory.py
          # Mondays: live QA OpenAPI; other days: committed snapshot from monorepo
          if [ "$(date -u +%u)" = "1" ]; then
            python3 dashboard/tools/generate_coverage.py --fetch-openapi || \
              python3 dashboard/tools/generate_coverage.py
          else
            python3 dashboard/tools/generate_coverage.py
          fi
          python3 dashboard/tools/generate_nightly.py
          python3 dashboard/tools/generate_progress.py
          python3 dashboard/tools/generate_ai_platform.py

      - name: Sync site assets into Pages root
        run: |
          set -euo pipefail
          D="_monorepo/gateway/unifiedApi/NexusApiRegressionTests/dashboard"
          cp "$D/index.html" "$D/inventory.html" "$D/coverage.html" "$D/nightly.html" \
             "$D/progress.html" "$D/ai-platform.html" .
          cp "$D/styles.css" "$D/overview.js" "$D/inventory.js" "$D/coverage.js" \
             "$D/nightly.js" "$D/progress.js" "$D/ai-platform.js" "$D/sidebar.js" .
          cp "$D/README.md" "$D/ROADMAP.md" . 2>/dev/null || true
          if [ -f "$D/styles-unify.css" ]; then cp "$D/styles-unify.css" .; fi
          mkdir -p data
          cp "$D/data/inventory.json" "$D/data/coverage.json" "$D/data/nightly.json" \
             "$D/data/progress.json" data/
          if [ -f "$D/data/ai-platform.json" ]; then cp "$D/data/ai-platform.json" data/; fi

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "nexus-ta-dashboard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          STAGE=(
            index.html inventory.html coverage.html nightly.html progress.html ai-platform.html
            styles.css overview.js inventory.js coverage.js nightly.js progress.js ai-platform.js sidebar.js
            README.md ROADMAP.md
            data/inventory.json data/coverage.json data/nightly.json data/progress.json
          )
          if [ -f data/ai-platform.json ]; then STAGE+=(data/ai-platform.json); fi
          if [ -f styles-unify.css ]; then STAGE+=(styles-unify.css); fi
          git add "${STAGE[@]}" \
            .github/workflows/refresh-dashboard.yml \
            .github/module-overlay || true
          if git diff --cached --quiet; then
            echo "No site changes to publish."
          else
            git commit -m "Refresh dashboard data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push origin HEAD:main
          fi
